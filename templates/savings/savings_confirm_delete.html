{% extends 'base.html' %}
{% block page_title %}Delete Savings Goal{% endblock %}
{% block content %}
<div class="row"><div class="col-md-5">
<div class="card p-4 text-center">
    <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
    <h5>Delete Savings Goal?</h5>
    <p class="text-muted">Are you sure you want to delete <strong>"{{ goal.title }}"</strong>?</p>
    <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'savings_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
</div></div>
{% endblock %}
